name: Feature Request
description: 提出功能建议 / Suggest a new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望添加的功能。
        Thanks for your suggestion! Please describe the feature you'd like.

  - type: textarea
    id: problem
    attributes:
      label: 问题/需求 / Problem or Need
      description: 你遇到了什么问题？或者缺少什么功能？/ What problem are you facing? What's missing?
      placeholder: 我希望能够... / I wish I could...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案 / Proposed Solution
      description: 你希望怎么解决？/ How would you like it to work?
      placeholder: |
        sql-cli xxx --option value
        # 或者
        新增 xxx 命令...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives Considered
      description: 你考虑过其他替代方案吗？/ Have you considered any alternatives?

  - type: dropdown
    id: db_type
    attributes:
      label: 相关数据库 / Relevant Database
      description: 这个建议与哪个数据库相关？/ Which database is this related to?
      multiple: true
      options:
        - 所有数据库 / All
        - MySQL
        - Oracle
        - PostgreSQL
        - SQLite
        - 达梦 / DM
        - Other
